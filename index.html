<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 로또 번호 추천기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    transition:.3s;
    padding:30px;
}

.container{
    width:700px;
    max-width:100%;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    transition:.3s;
}

h1{
    color:#333;
    margin-bottom:25px;
}

#numbers{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin:35px 0;
    min-height:70px;
    flex-wrap:nowrap;
}

.ball{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
    animation:pop .35s ease;
}

@keyframes pop{
    0%{
        transform:scale(0);
        opacity:0;
    }
    80%{
        transform:scale(1.15);
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

button{
    padding:14px 28px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:scale(1.05);
}

#themeBtn{
    background:#333;
    color:white;
    margin-bottom:15px;
}

#themeBtn:hover{
    background:#555;
}

#generateBtn{
    background:#007bff;
    color:white;
    margin-top:10px;
}

#generateBtn:hover{
    background:#0056b3;
}

/* 문의 폼 */

.contact{
    margin-top:50px;
    text-align:left;
}

.contact h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.contact input,
.contact textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

.contact input:focus,
.contact textarea:focus{
    border-color:#007bff;
}

.contact textarea{
    resize:vertical;
}

.contact button{
    width:100%;
    background:#28a745;
    color:white;
}

.contact button:hover{
    background:#218838;
}

/* 다크모드 */

body.dark{
    background:linear-gradient(135deg,#111827,#1f2937);
}

body.dark .container{
    background:#1f2937;
}

body.dark h1,
body.dark .contact h2{
    color:white;
}

body.dark #themeBtn{
    background:white;
    color:#222;
}

body.dark #themeBtn:hover{
    background:#ddd;
}

body.dark #generateBtn{
    background:#2563eb;
}

body.dark .contact input,
body.dark .contact textarea{
    background:#374151;
    color:white;
    border:1px solid #555;
}

body.dark .contact input::placeholder,
body.dark .contact textarea::placeholder{
    color:#bbb;
}

@media(max-width:700px){

.container{
    padding:25px;
}

.ball{
    width:42px;
    height:42px;
    font-size:18px;
}

#numbers{
    gap:6px;
}

button{
    width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<h1>🎲 로또 번호 추천기</h1>

<button id="themeBtn" onclick="toggleTheme()">
🌙 다크모드
</button>

<div id="numbers"></div>

<button id="generateBtn" onclick="generateLotto()">
번호 추천받기
</button>

<div class="contact">

<hr style="margin:40px 0;">

<h2>📩 제휴 문의</h2>

<!-- YOUR_FORM_ID를 Formspree에서 받은 ID로 변경 -->
<form action="https://formspree.io/f/mbdnajdd" method="POST">

<input
type="text"
name="name"
placeholder="이름 또는 회사명"
required>

<input
type="email"
name="email"
placeholder="이메일"
required>

<textarea
name="message"
rows="6"
placeholder="문의 내용을 입력해주세요."
required></textarea>

<button type="submit">
문의 보내기
</button>

</form>

</div>

</div>

<script>

function getColor(num){
    if(num<=10) return "#fbc400";
    if(num<=20) return "#69c8f2";
    if(num<=30) return "#ff7272";
    if(num<=40) return "#aaaaaa";
    return "#7bcc6d";
}

function generateLotto(){

    let numbers=[];

    while(numbers.length<6){

        let n=Math.floor(Math.random()*45)+1;

        if(!numbers.includes(n)){
            numbers.push(n);
        }

    }

    numbers.sort((a,b)=>a-b);

    const result=document.getElementById("numbers");
    result.innerHTML="";

    numbers.forEach((num,index)=>{

        const ball=document.createElement("div");

        ball.className="ball";
        ball.style.background=getColor(num);
        ball.style.animationDelay=(index*0.08)+"s";
        ball.textContent=num;

        result.appendChild(ball);

    });

}

const savedTheme=localStorage.getItem("theme");

if(savedTheme==="dark"){
    document.body.classList.add("dark");
    document.getElementById("themeBtn").innerHTML="☀️ 화이트모드";
}

function toggleTheme(){

    document.body.classList.toggle("dark");

    const btn=document.getElementById("themeBtn");

    if(document.body.classList.contains("dark")){
        btn.innerHTML="☀️ 화이트모드";
        localStorage.setItem("theme","dark");
    }else{
        btn.innerHTML="🌙 다크모드";
        localStorage.setItem("theme","light");
    }

}

generateLotto();

</script>

</body>
</html>
