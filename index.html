<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --yellow: #facc15;
      --blue: #3b82f6;
      --red: #ef4444;
      --gray: #9ca3af;
      --green: #22c55e;
      --radius: 16px;
    }

    body {
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(99, 102, 241, 0.18), transparent),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(250, 204, 21, 0.1), transparent);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.35rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .option-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .option-group select,
    .option-group input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--surface2);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .option-group select:focus,
    .option-group input:focus {
      border-color: var(--accent);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-row input {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      flex: 1;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, opacity 0.2s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-secondary:hover { background: #475569; }

    .result-set {
      background: var(--bg);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      animation: fadeIn 0.35s ease;
    }

    .result-set:last-child { margin-bottom: 0; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .set-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 2.5rem;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      flex: 1;
      justify-content: center;
    }

    .ball {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.25);
    }

    .ball.yellow { background: linear-gradient(145deg, #fde047, #ca8a04); color: #1a1a1a; text-shadow: none; }
    .ball.blue   { background: linear-gradient(145deg, #60a5fa, #1d4ed8); }
    .ball.red    { background: linear-gradient(145deg, #f87171, #b91c1c); }
    .ball.gray   { background: linear-gradient(145deg, #d1d5db, #6b7280); color: #1a1a1a; text-shadow: none; }
    .ball.green  { background: linear-gradient(145deg, #4ade80, #15803d); }

    .copy-btn {
      background: none;
      border: 1px solid var(--surface2);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
    }

    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--surface2);
      font-size: 0.85rem;
    }

    .history-item:last-child { border-bottom: none; }

    .history-time {
      color: var(--muted);
      font-size: 0.75rem;
      min-width: 3.5rem;
    }

    .history-nums {
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      color: var(--text);
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 480px) {
      .options { grid-template-columns: 1fr; }
      .ball { width: 34px; height: 34px; font-size: 0.82rem; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <header>
      <div class="icon">🎱</div>
      <h1>로또 번호 추천</h1>
      <p>1 ~ 45 사이 숫자 6개를 무작위로 추천합니다</p>
    </header>

    <div class="card">
      <div class="card-title">설정</div>
      <div class="options">
        <div class="option-group">
          <label for="setCount">생성 개수</label>
          <select id="setCount">
            <option value="1">1세트</option>
            <option value="3">3세트</option>
            <option value="5" selected>5세트</option>
            <option value="10">10세트</option>
          </select>
        </div>
        <div class="option-group">
          <label for="oddEven">홀짝 비율</label>
          <select id="oddEven">
            <option value="any">제한 없음</option>
            <option value="3-3">홀3 · 짝3</option>
            <option value="4-2">홀4 · 짝2</option>
            <option value="2-4">홀2 · 짝4</option>
          </select>
        </div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="noDuplicate" checked />
        세트 간 중복 번호 제외
      </label>
    </div>

    <div class="btn-row" style="margin-bottom: 1.25rem;">
      <button class="btn btn-primary" id="generateBtn">🎲 번호 추천</button>
      <button class="btn btn-secondary" id="clearBtn">초기화</button>
    </div>

    <div class="card">
      <div class="card-title">추천 번호</div>
      <div id="results">
        <div class="empty-state">
          <div class="emoji">✨</div>
          <p>위 버튼을 눌러 번호를 생성하세요</p>
        </div>
      </div>
    </div>

    <div class="card" id="historyCard" style="display:none;">
      <div class="card-title">최근 기록</div>
      <div id="history"></div>
    </div>

    <footer>
      ※ 무작위 추천이며 당첨을 보장하지 않습니다. 재미로만 이용해 주세요!
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const MIN = 1;
    const MAX = 45;
    const COUNT = 6;

    const resultsEl = document.getElementById("results");
    const historyEl = document.getElementById("history");
    const historyCard = document.getElementById("historyCard");
    const toastEl = document.getElementById("toast");

    let history = [];
    let usedNumbers = new Set();

    function ballColor(n) {
      if (n <= 10) return "yellow";
      if (n <= 20) return "blue";
      if (n <= 30) return "red";
      if (n <= 40) return "gray";
      return "green";
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 2000);
    }

    function parseOddEven(val) {
      if (val === "any") return null;
      const [odd, even] = val.split("-").map(Number);
      return { odd, even };
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateOneSet(excludeSet, ratio) {
      const pool = [];
      for (let i = MIN; i <= MAX; i++) {
        if (!excludeSet.has(i)) pool.push(i);
      }

      if (ratio) {
        const odds = pool.filter(n => n % 2 === 1);
        const evens = pool.filter(n => n % 2 === 0);
        if (odds.length < ratio.odd || evens.length < ratio.even) return null;

        shuffle(odds);
        shuffle(evens);
        const picked = [...odds.slice(0, ratio.odd), ...evens.slice(0, ratio.even)];
        return shuffle(picked).sort((a, b) => a - b);
      }

      shuffle(pool);
      return pool.slice(0, COUNT).sort((a, b) => a - b);
    }

    function generateSets() {
      const setCount = Number(document.getElementById("setCount").value);
      const ratio = parseOddEven(document.getElementById("oddEven").value);
      const noDuplicate = document.getElementById("noDuplicate").checked;

      const sets = [];
      const globalUsed = new Set();

      for (let i = 0; i < setCount; i++) {
        const exclude = noDuplicate ? globalUsed : new Set();
        let nums = null;
        let attempts = 0;

        while (!nums && attempts < 200) {
          nums = generateOneSet(exclude, ratio);
          attempts++;
        }

        if (!nums) {
          showToast("조건을 만족하는 번호를 생성하지 못했습니다");
          return;
        }

        nums.forEach(n => globalUsed.add(n));
        sets.push(nums);
      }

      renderResults(sets);
      addHistory(sets);
    }

    function renderResults(sets) {
      resultsEl.innerHTML = sets.map((nums, i) => `
        <div class="result-set">
          <span class="set-label">${String(i + 1).padStart(2, " ")}</span>
          <div class="balls">
            ${nums.map(n => `<span class="ball ${ballColor(n)}">${n}</span>`).join("")}
          </div>
          <button class="copy-btn" data-nums="${nums.join(",")}">복사</button>
        </div>
      `).join("");

      resultsEl.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const text = btn.dataset.nums.replace(/,/g, ", ");
          navigator.clipboard.writeText(text).then(() => showToast("번호가 복사되었습니다"));
        });
      });
    }

    function addHistory(sets) {
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

      sets.forEach(nums => {
        history.unshift({ time, nums });
      });

      history = history.slice(0, 10);
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) {
        historyCard.style.display = "none";
        return;
      }

      historyCard.style.display = "block";
      historyEl.innerHTML = history.map(h => `
        <div class="history-item">
          <span class="history-time">${h.time}</span>
          <span class="history-nums">${h.nums.join(" · ")}</span>
        </div>
      `).join("");
    }

    function clearAll() {
      resultsEl.innerHTML = `
        <div class="empty-state">
          <div class="emoji">✨</div>
          <p>위 버튼을 눌러 번호를 생성하세요</p>
        </div>`;
      history = [];
      renderHistory();
    }

    document.getElementById("generateBtn").addEventListener("click", generateSets);
    document.getElementById("clearBtn").addEventListener("click", clearAll);
  </script>
</body>
</html>
