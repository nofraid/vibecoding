<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 추천기</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Pretendard', sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .container{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 15px 35px rgba(0,0,0,.2);
        width:450px;
    }

    h1{
        margin-bottom:30px;
        color:#333;
    }

    #numbers{
        display:flex;
        justify-content:center;
        gap:10px;
        flex-wrap:wrap;
        margin:30px 0;
        min-height:60px;
    }

    .ball{
        width:55px;
        height:55px;
        border-radius:50%;
        color:white;
        font-size:22px;
        font-weight:bold;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    button{
        padding:15px 35px;
        border:none;
        border-radius:10px;
        background:#007bff;
        color:white;
        font-size:18px;
        cursor:pointer;
        transition:.2s;
    }

    button:hover{
        background:#0056b3;
        transform:scale(1.05);
    }
</style>

</head>
<body>

<div class="container">
    <h1>🎲 로또 번호 추천</h1>

    <div id="numbers"></div>

    <button onclick="generateLotto()">
        번호 추천받기
    </button>
</div>

<script>
function getColor(num){
    if(num<=10) return "#fbc400";   // 노랑
    if(num<=20) return "#69c8f2";   // 파랑
    if(num<=30) return "#ff7272";   // 빨강
    if(num<=40) return "#aaaaaa";   // 회색
    return "#7bcc6d";               // 초록
}

function generateLotto(){

    let numbers=[];

    while(numbers.length<6){
        let n=Math.floor(Math.random()*45)+1;

        if(!numbers.includes(n)){
            numbers.push(n);
        }
    }

    numbers.sort((a,b)=>a-b);

    const result=document.getElementById("numbers");
    result.innerHTML="";

    numbers.forEach(num=>{
        const ball=document.createElement("div");
        ball.className="ball";
        ball.style.background=getColor(num);
        ball.textContent=num;
        result.appendChild(ball);
    });
}
</script>

</body>
</html>
