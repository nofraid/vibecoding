<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 로또 번호 추천기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    transition:.3s;
}

.container{
    width:600px;
    max-width:95%;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    transition:.3s;
}

h1{
    color:#333;
    margin-bottom:25px;
}

#numbers{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin:35px 0;
    min-height:70px;
    flex-wrap:nowrap;
}

.ball{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
    animation:pop .35s ease;
}

@keyframes pop{
    0%{
        transform:scale(0);
        opacity:0;
    }
    80%{
        transform:scale(1.15);
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

button{
    padding:14px 28px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:scale(1.05);
}

#themeBtn{
    background:#333;
    color:white;
    margin-bottom:15px;
}

#themeBtn:hover{
    background:#555;
}

#generateBtn{
    background:#007bff;
    color:white;
}

#generateBtn:hover{
    background:#0056b3;
}

/* ===== 다크모드 ===== */

body.dark{
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

body.dark .container{
    background:#1f2937;
}

body.dark h1{
    color:white;
}

body.dark #themeBtn{
    background:white;
    color:#222;
}

body.dark #themeBtn:hover{
    background:#ddd;
}

body.dark #generateBtn{
    background:#2563eb;
}

body.dark #generateBtn:hover{
    background:#1d4ed8;
}

/* ===== 모바일 ===== */

@media(max-width:650px){

.container{
    width:95%;
    padding:25px;
}

.ball{
    width:42px;
    height:42px;
    font-size:18px;
}

#numbers{
    gap:6px;
}

button{
    width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎲 로또 번호 추천기</h1>

<button id="themeBtn" onclick="toggleTheme()">
🌙 다크모드
</button>

<div id="numbers"></div>

<button id="generateBtn" onclick="generateLotto()">
번호 추천받기
</button>

</div>

<script>

function getColor(num){
    if(num<=10) return "#fbc400";
    if(num<=20) return "#69c8f2";
    if(num<=30) return "#ff7272";
    if(num<=40) return "#aaaaaa";
    return "#7bcc6d";
}

function generateLotto(){

    let numbers=[];

    while(numbers.length<6){

        let n=Math.floor(Math.random()*45)+1;

        if(!numbers.includes(n)){
            numbers.push(n);
        }

    }

    numbers.sort((a,b)=>a-b);

    const result=document.getElementById("numbers");
    result.innerHTML="";

    numbers.forEach((num,index)=>{

        const ball=document.createElement("div");

        ball.className="ball";
        ball.style.background=getColor(num);
        ball.style.animationDelay=(index*0.08)+"s";
        ball.textContent=num;

        result.appendChild(ball);

    });

}

// ===== 다크모드 =====

const savedTheme=localStorage.getItem("theme");

if(savedTheme==="dark"){
    document.body.classList.add("dark");
    document.getElementById("themeBtn").innerHTML="☀️ 화이트모드";
}

function toggleTheme(){

    document.body.classList.toggle("dark");

    const btn=document.getElementById("themeBtn");

    if(document.body.classList.contains("dark")){
        btn.innerHTML="☀️ 화이트모드";
        localStorage.setItem("theme","dark");
    }else{
        btn.innerHTML="🌙 다크모드";
        localStorage.setItem("theme","light");
    }

}

generateLotto();

</script>

</body>
</html>
